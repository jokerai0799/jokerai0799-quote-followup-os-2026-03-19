<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square bg -->
  <rect width="100" height="100" rx="22" fill="#0B1E35"/>

  <!-- Three chevrons: muted → mid → cyan -->
  <!-- Chevron 1 -->
  <polyline points="22,28 36,50 22,72"
    fill="none" stroke="#132D4A" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chevron 2 -->
  <polyline points="38,28 52,50 38,72"
    fill="none" stroke="#1A5080" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chevron 3 (cyan — the follow-up) -->
  <polyline points="54,28 68,50 54,72"
    fill="none" stroke="#0EA5E9" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>