<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <!-- Icon: document with pulse, white version for blue navbar -->
  <g>
    <!-- Document shape -->
    <path d="M4 2 L18 2 L24 8 L24 38 L4 38 Z" fill="white" rx="2"/>
    <!-- Folded corner -->
    <path d="M18 2 L18 8 L24 8" fill="none" stroke="rgba(61,82,238,0.35)" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Fold fill -->
    <path d="M18 2 L18 8 L24 8 L18 2 Z" fill="rgba(61,82,238,0.12)"/>
    <!-- Pulse / activity line -->
    <path d="M8 20 L11 20 L13 16 L15.5 25 L18 20 L20 20" stroke="#3D52EE" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Text lines -->
    <line x1="8" y1="29" x2="20" y2="29" stroke="rgba(61,82,238,0.3)" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="8" y1="33" x2="15" y2="33" stroke="rgba(61,82,238,0.2)" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="30" y="15" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="-0.2">Quote</text>
  <text x="30" y="29" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.75)" letter-spacing="0.3">Followup</text>
</svg>
